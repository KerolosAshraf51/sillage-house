<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Sillage House</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" type="image/jpeg" href="images/logo.jpg">
</head>
<body style="background-color: var(--primary-black);">

  <!-- Top Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top border-bottom" style="border-color: var(--glass-border) !important;">
    <div class="container-fluid px-4">
      <a class="navbar-brand m-0" href="index.html">Sillage <span>Admin</span></a>
      
      <div class="d-flex align-items-center ms-auto">
        <span class="text-light me-4"><i class="fas fa-user-circle text-gold me-2"></i> Admin User</span>
        <button id="logout-btn" class="btn btn-outline-gold btn-sm" style="padding: 5px 15px;">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      
      <!-- Sidebar -->
      <div class="col-md-3 col-lg-2 admin-sidebar px-0">
        <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist" aria-orientation="vertical">
          <button class="nav-link text-start active" id="v-pills-dashboard-tab" data-bs-toggle="pill" data-bs-target="#v-pills-dashboard" type="button" role="tab" aria-selected="true">
            <i class="fas fa-tachometer-alt"></i> Dashboard
          </button>
          <button class="nav-link text-start" id="v-pills-products-tab" data-bs-toggle="pill" data-bs-target="#v-pills-products" type="button" role="tab" aria-selected="false">
            <i class="fas fa-box-open"></i> Products
          </button>
          <button class="nav-link text-start" id="v-pills-categories-tab" data-bs-toggle="pill" data-bs-target="#v-pills-categories" type="button" role="tab" aria-selected="false">
            <i class="fas fa-tags"></i> Categories
          </button>
        </div>
      </div>

      <!-- Main Content -->
      <div class="col-md-9 col-lg-10 admin-content">
        <div class="tab-content" id="v-pills-tabContent">
          
          <!-- Dashboard Tab -->
          <div class="tab-pane fade show active" id="v-pills-dashboard" role="tabpanel">
            <h2 class="text-white mb-4">Dashboard Overview</h2>
            
            <div class="row mb-5">
              <div class="col-md-6 mb-4 mb-md-0">
                <div class="bg-dark-glass stat-card">
                  <p>Total Products</p>
                  <h3 id="total-products-stat">0</h3>
                </div>
              </div>
              <div class="col-md-6 mb-4 mb-md-0">
                <div class="bg-dark-glass stat-card">
                  <p>Categories</p>
                  <h3 id="total-categories-stat">0</h3>
                </div>
              </div>
            </div>
            
            <div class="bg-dark-glass p-4 rounded">
              <h4 class="text-gold mb-3">Quick Actions</h4>
              <button class="btn btn-gold me-3" onclick="openAddModal()"><i class="fas fa-plus me-2"></i>Add New Product</button>
              <a href="shop.html" target="_blank" class="btn btn-outline-light"><i class="fas fa-external-link-alt me-2"></i>View Store</a>
            </div>
          </div>
          
          <!-- Products Tab -->
          <div class="tab-pane fade" id="v-pills-products" role="tabpanel">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h2 class="text-white m-0">Product Management</h2>
              <button class="btn btn-gold" onclick="openAddModal()"><i class="fas fa-plus me-2"></i> Add Product</button>
            </div>
            
            <div class="table-responsive bg-dark-glass p-4 rounded">
              <table class="table table-dark table-hover" id="admin-product-table">
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Brand</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Injected by JS -->
                </tbody>
              </table>
            </div>
          </div>
          
          <!-- Categories Tab -->
          <div class="tab-pane fade" id="v-pills-categories" role="tabpanel">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h2 class="text-white m-0">Categories Management</h2>
              <button class="btn btn-gold" onclick="openCategoryModal()"><i class="fas fa-plus me-2"></i> Add Category</button>
            </div>
            
            <div class="mb-4">
              <input type="text" class="form-control bg-dark text-white border-secondary" id="category-search" placeholder="Search categories...">
            </div>

            <div class="table-responsive bg-dark-glass p-4 rounded">
              <table class="table table-dark table-hover" id="admin-category-table">
                <thead>
                  <tr>
                    <th>Category Name</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody>
                  <!-- Injected by JS -->
                </tbody>
              </table>
            </div>
          </div>
          
        </div>
      </div>
    </div>
  </div>

  <!-- Product Modal -->
  <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <form id="product-form">
          <div class="modal-header">
            <h5 class="modal-title text-gold" id="productModalLabel">Add/Edit Product</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Product Name *</label>
                <input type="text" class="form-control" id="p-name" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Brand *</label>
                <input type="text" class="form-control" id="p-brand" required>
              </div>
            </div>
            
            <div class="row">
              <div class="col-md-3 mb-3">
                <label class="form-label">Price ($) *</label>
                <input type="number" step="0.01" class="form-control" id="p-price" required>
              </div>
              <div class="col-md-3 mb-3">
                <label class="form-label">Old Price ($)</label>
                <input type="number" step="0.01" class="form-control" id="p-oldprice">
              </div>
              <div class="col-md-3 mb-3">
                <label class="form-label">Category</label>
                <select class="form-select bg-dark text-white border-secondary" id="p-category">
                  <option value="Uncategorized">Uncategorized</option>
                </select>
              </div>
              <div class="col-md-3 mb-3">
                <label class="form-label">Volume</label>
                <input type="number" class="form-control" id="p-volume" value="100" required>
              </div>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Image URLs * <small class="text-secondary">(Enter URL and click Add)</small></label>
              <div class="input-group">
                <input type="text" class="form-control bg-dark text-white border-secondary" id="p-image-url-input" placeholder="https://example.com/image.jpg">
                <button class="btn btn-outline-gold" type="button" id="p-add-image-url">Add URL</button>
              </div>
              <div id="image-preview-container" class="mt-3 d-flex flex-wrap gap-2">
                <!-- Previews injected here -->
              </div>
            </div>
            
            <div class="mb-4">
              <label class="form-label">Description (Optional)</label>
              <textarea class="form-control" id="p-desc" rows="4"></textarea>
            </div>
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="p-new">
                  <label class="form-check-label text-light">Mark as New Arrival</label>
                </div>
              </div>
              <div class="col-md-6 mb-3">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="p-bestseller">
                  <label class="form-check-label text-light">Mark as Best Seller</label>
                </div>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal" style="border-radius: 0;">Cancel</button>
            <button type="submit" class="btn btn-gold">Save Product</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Category Modal -->
  <div class="modal fade" id="categoryModal" tabindex="-1" aria-labelledby="categoryModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="category-form">
          <div class="modal-header">
            <h5 class="modal-title text-gold" id="categoryModalLabel">Add/Edit Category</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <div class="mb-3">
              <label class="form-label">Category Name *</label>
              <input type="text" class="form-control" id="c-name" required>
              <input type="hidden" id="c-old-name">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal" style="border-radius: 0;">Cancel</button>
            <button type="submit" class="btn btn-gold">Save Category</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/products.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
