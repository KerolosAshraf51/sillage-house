<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Sillage House</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" type="image/jpeg" href="images/logo.jpg">
</head>
<body>

  <!-- Minimal Navbar for Login -->
  <nav class="navbar navbar-expand-lg fixed-top" style="background: rgba(10, 10, 10, 0.95) !important;">
    <div class="container justify-content-center">
      <a class="navbar-brand m-0" href="index.html">Sillage <span>House</span></a>
    </div>
  </nav>

  <div class="login-wrapper">
    <div class="login-card bg-dark-glass fade-in-section">
      <div class="login-logo">
        Admin <span class="text-gold">Login</span>
      </div>
      
      <div id="login-error" class="alert alert-danger d-none text-center" style="background: rgba(220, 53, 69, 0.2); border-color: #dc3545; color: #fff;">
        Invalid credentials.
      </div>
      
      <form id="login-form">
        <div class="mb-4">
          <label class="form-label">Email Address</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-secondary text-gold">
              <i class="fas fa-envelope"></i>
            </span>
            <input type="email" id="admin-email" class="form-control border-start-0" required placeholder="admin@sillage.com">
          </div>
        </div>
        
        <div class="mb-5">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-transparent border-end-0 border-secondary text-gold">
              <i class="fas fa-lock"></i>
            </span>
            <input type="password" id="admin-pass" class="form-control border-start-0" required placeholder="••••••••">
          </div>
        </div>
        
        <button type="submit" class="btn btn-gold w-100 py-3 mb-3">Login</button>
        <a href="index.html" class="btn btn-outline-light w-100 py-3" style="border-radius: 0;">Back to Store</a>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Redirect if already logged in
      if (typeof AuthService !== 'undefined') {
        AuthService.redirectIfAuthenticated();
      }
      
      const loginForm = document.getElementById('login-form');
      const errorMsg = document.getElementById('login-error');
      
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const email = document.getElementById('admin-email').value;
        const pass = document.getElementById('admin-pass').value;
        
        if (AuthService.login(email, pass)) {
          window.location.href = 'admin.html';
        } else {
          errorMsg.classList.remove('d-none');
          // Add shake animation
          const card = document.querySelector('.login-card');
          card.style.transform = 'translateX(-10px)';
          setTimeout(() => card.style.transform = 'translateX(10px)', 100);
          setTimeout(() => card.style.transform = 'translateX(-10px)', 200);
          setTimeout(() => card.style.transform = 'translateX(10px)', 300);
          setTimeout(() => card.style.transform = 'none', 400);
        }
      });
    });
  </script>
</body>
</html>
